<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus — Messenger</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0f14;--surface:#13161e;--panel:#1a1d27;--border:#252836;
  --accent:#6c8aff;--accent2:#ff6c8a;--green:#4ade80;--red:#ff4f6a;
  --text:#e8eaf2;--muted:#5a5e72;--bme:#6c8aff;--bthem:#1f2333;
  --fu:'Syne',sans-serif;--fb:'DM Sans',sans-serif;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--fb)}

/* ── LOGIN ── */
#ls{display:flex;align-items:center;justify-content:center;height:100vh;
  background:radial-gradient(ellipse 80% 60% at 50% 0%,#1a1f3a 0%,var(--bg) 70%)}
.lbox{width:380px;padding:48px 40px;background:var(--surface);border:1px solid var(--border);
  border-radius:24px;box-shadow:0 32px 80px rgba(0,0,0,.6);animation:fadeUp .5s ease both}
.llogo{font-family:var(--fu);font-size:28px;font-weight:800;letter-spacing:-1px;margin-bottom:6px}
.llogo span{color:var(--accent)}
.lsub{color:var(--muted);font-size:13px;margin-bottom:32px;line-height:1.6}
.llbl{font-family:var(--fu);font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;display:block}
.linp{width:100%;padding:12px 16px;background:var(--panel);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:var(--fb);font-size:15px;outline:none;transition:border-color .2s;margin-bottom:16px}
.linp:focus{border-color:var(--accent)}
.chips{display:flex;gap:8px;margin-bottom:24px}
.chip{flex:1;padding:10px;border-radius:10px;cursor:pointer;border:1.5px solid var(--border);background:var(--panel);font-family:var(--fu);font-size:13px;font-weight:600;color:var(--muted);transition:all .18s;text-align:center}
.chip:hover{border-color:var(--accent);color:var(--text)}
.chip.active{border-color:var(--accent);background:rgba(108,138,255,.12);color:var(--accent)}
.lbtn{width:100%;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:10px;cursor:pointer;font-family:var(--fu);font-size:15px;font-weight:700;transition:opacity .18s,transform .1s}
.lbtn:hover{opacity:.88}.lbtn:active{transform:scale(.98)}
.lerr{color:var(--accent2);font-size:12px;margin-top:10px;min-height:16px}

/* ── APP ── */
#app{display:none;height:100vh;grid-template-columns:300px 1fr}
#app.on{display:grid;animation:fadeIn .3s ease}

/* ── SIDEBAR ── */
.sb{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sbh{padding:20px 20px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.sblogo{font-family:var(--fu);font-size:20px;font-weight:800;letter-spacing:-.5px}
.sblogo span{color:var(--accent)}
.myp{display:flex;align-items:center;gap:10px}
.avsm{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--fu);font-size:12px;font-weight:700;flex-shrink:0}
.myn{font-size:13px;font-weight:500}
.sbs{padding:12px 16px;border-bottom:1px solid var(--border)}
.sinp{width:100%;padding:9px 14px;background:var(--panel);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--fb);font-size:13px;outline:none}
.cttl{padding:16px 16px 8px;font-family:var(--fu);font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
.cl{flex:1;overflow-y:auto;padding-bottom:12px}
.cl::-webkit-scrollbar{width:3px}.cl::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.ci{display:flex;align-items:center;gap:12px;padding:10px 16px;cursor:pointer;transition:background .15s;border-radius:10px;margin:0 6px}
.ci:hover{background:var(--panel)}.ci.active{background:rgba(108,138,255,.12)}
.av{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--fu);font-size:16px;font-weight:700;flex-shrink:0;position:relative}
.dot{position:absolute;bottom:1px;right:1px;width:11px;height:11px;border-radius:50%;background:var(--green);border:2px solid var(--surface)}
.cin{flex:1;min-width:0}
.cn{font-size:14px;font-weight:500}
.cp{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.cm{text-align:right}
.ct{font-size:11px;color:var(--muted)}
.badge{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;border-radius:9px;background:var(--accent);color:#fff;font-family:var(--fu);font-size:10px;font-weight:700;padding:0 5px;margin-top:4px}

/* ── CHAT ── */
.ca{display:flex;flex-direction:column;background:var(--bg);position:relative;overflow:hidden}
.chdr{display:flex;align-items:center;gap:14px;padding:16px 24px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.chi{flex:1}
.cpn{font-family:var(--fu);font-size:16px;font-weight:700}
.cps{font-size:12px;color:var(--green)}
.cact{display:flex;gap:8px}
.ibtn{width:36px;height:36px;border-radius:8px;border:1px solid var(--border);background:var(--panel);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .18s}
.ibtn:hover{border-color:var(--accent);color:var(--accent)}
.ibtn svg{width:16px;height:16px}

.mw{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:4px;scroll-behavior:smooth}
.mw::-webkit-scrollbar{width:4px}.mw::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.ddiv{text-align:center;margin:16px 0;font-size:11px;color:var(--muted);font-family:var(--fu);font-weight:600;letter-spacing:.06em}
.ddiv span{background:var(--panel);padding:4px 12px;border-radius:20px;border:1px solid var(--border)}

.mg{display:flex;flex-direction:column;gap:2px;margin-bottom:8px}
.mg.me{align-items:flex-end}.mg.them{align-items:flex-start}
.bub{max-width:68%;padding:10px 14px;border-radius:18px;font-size:14px;line-height:1.5;word-break:break-word;animation:popIn .2s cubic-bezier(.175,.885,.32,1.275) both}
.mg.me .bub{background:var(--bme);color:#fff;border-bottom-right-radius:5px}
.mg.them .bub{background:var(--bthem);color:var(--text);border-bottom-left-radius:5px}
.bt{display:block;font-size:10px;opacity:.6;margin-top:3px;text-align:right}
.mg.them .bt{text-align:left}
.rr{font-size:10px;color:rgba(255,255,255,.4);margin-top:2px;padding-right:2px;text-align:right}
.rr.read{color:var(--green)}

.cepill{display:flex;align-items:center;justify-content:center;margin:8px 0}
.cepill-inner{background:var(--panel);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px}
.cepill-inner svg{width:13px;height:13px;flex-shrink:0}
.cepill-inner.missed{color:var(--red);border-color:rgba(255,79,106,.3)}
.cepill-inner.ok{color:var(--green);border-color:rgba(74,222,128,.3)}

.ti{display:none;align-items:center;gap:10px;padding:0 24px 12px}
.ti.show{display:flex}
.td{display:flex;gap:4px}
.td span{width:7px;height:7px;border-radius:50%;background:var(--muted);animation:bounce 1.2s ease infinite}
.td span:nth-child(2){animation-delay:.2s}.td span:nth-child(3){animation-delay:.4s}
.tl{font-size:12px;color:var(--muted);font-style:italic}

.ia{padding:16px 24px;background:var(--surface);border-top:1px solid var(--border);display:flex;align-items:flex-end;gap:12px;flex-shrink:0}
.iw{flex:1;background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:10px 14px;transition:border-color .2s}
.iw:focus-within{border-color:var(--accent)}
#mi{width:100%;background:transparent;border:none;outline:none;color:var(--text);font-family:var(--fb);font-size:14px;resize:none;max-height:120px;line-height:1.5}
#mi::placeholder{color:var(--muted)}
.sbtn{width:44px;height:44px;border-radius:12px;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:opacity .18s,transform .1s;flex-shrink:0}
.sbtn:hover{opacity:.88}.sbtn:active{transform:scale(.94)}
.sbtn svg{width:18px;height:18px;fill:#fff}

.ec{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--muted)}
.ec svg{width:48px;height:48px;opacity:.3}
.ec p{font-size:14px}

/* ── CALL OVERLAY ── */
#co{display:none;position:absolute;inset:0;z-index:100;flex-direction:column;background:#080a10;overflow:hidden}
#co.show{display:flex}
.vm{flex:1;position:relative;background:#0a0c14;display:flex;align-items:center;justify-content:center;overflow:hidden}
#rv{width:100%;height:100%;object-fit:cover;display:none}
.nvp{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.nva{width:120px;height:120px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--fu);font-size:44px;font-weight:800}
.nvn{font-family:var(--fu);font-size:22px;font-weight:700}
.nvs{font-size:13px;color:var(--muted)}
.sp{position:absolute;bottom:108px;right:20px;width:140px;height:100px;border-radius:14px;overflow:hidden;border:2px solid var(--border);background:#111;cursor:pointer;box-shadow:0 8px 32px rgba(0,0,0,.6);transition:transform .2s;display:none}
.sp:hover{transform:scale(1.04)}
#lv{width:100%;height:100%;object-fit:cover;transform:scaleX(-1)}
.smo{display:none;position:absolute;inset:0;background:rgba(10,12,20,.85);align-items:center;justify-content:center}
.smo.show{display:flex}.smo svg{width:30px;height:30px;opacity:.7}
.cib{position:absolute;top:0;left:0;right:0;padding:20px 24px;display:flex;align-items:center;gap:12px;background:linear-gradient(to bottom,rgba(0,0,0,.7) 0%,transparent 100%)}
.cpav{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--fu);font-size:13px;font-weight:700}
.cpnm{font-family:var(--fu);font-size:15px;font-weight:700}
.ctmr{font-size:12px;color:var(--green);margin-left:auto;font-family:var(--fu);font-weight:600;letter-spacing:.04em;display:none}
.cstx{font-size:12px;color:var(--muted);margin-left:auto}
.cc{padding:20px;display:flex;justify-content:center;align-items:center;gap:16px;background:linear-gradient(to top,rgba(0,0,0,.8) 0%,transparent 100%);position:absolute;bottom:0;left:0;right:0}
.cbtn{width:56px;height:56px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .15s,opacity .15s;background:rgba(255,255,255,.1);color:var(--text)}
.cbtn:hover{transform:scale(1.08);background:rgba(255,255,255,.18)}.cbtn:active{transform:scale(.94)}
.cbtn svg{width:22px;height:22px;fill:currentColor}
.cbtn.muted{background:rgba(255,79,106,.2);color:var(--red)}
.cbtn.camoff{background:rgba(255,79,106,.2);color:var(--red)}
.cbtn.end{background:var(--red);color:#fff;width:64px;height:64px}
.cbtn.end svg{width:26px;height:26px}
.ring{width:140px;height:140px;border-radius:50%;border:3px solid rgba(108,138,255,.2);border-top-color:var(--accent);animation:spin 1.2s linear infinite;position:absolute}

/* ── INCOMING ── */
#im{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);align-items:center;justify-content:center;animation:fadeIn .25s ease}
#im.show{display:flex}
.ibox{background:var(--surface);border:1px solid var(--border);border-radius:28px;padding:40px 48px;text-align:center;box-shadow:0 40px 100px rgba(0,0,0,.7);animation:fadeUp .3s ease;min-width:300px}
.iiav{width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--fu);font-size:28px;font-weight:800;margin:0 auto 16px;animation:pulse 2s ease infinite}
.iin{font-family:var(--fu);font-size:22px;font-weight:800;margin-bottom:4px}
.iit{font-size:13px;color:var(--muted);margin-bottom:32px}
.iia{display:flex;gap:20px;justify-content:center}
.cta{width:64px;height:64px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .15s}
.cta:hover{transform:scale(1.1)}.cta:active{transform:scale(.96)}
.cta svg{width:26px;height:26px;fill:#fff}
.dec{background:var(--red)}.acc{background:var(--green)}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;right:24px;background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:12px 18px;font-size:13px;color:var(--text);box-shadow:0 8px 32px rgba(0,0,0,.5);animation:fadeUp .3s ease;z-index:1000;max-width:300px}
.toast strong{color:var(--accent)}

/* ── ANIMS ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes popIn{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 8px rgba(108,138,255,.12),0 0 0 16px rgba(108,138,255,.06)}50%{box-shadow:0 0 0 12px rgba(108,138,255,.2),0 0 0 24px rgba(108,138,255,.08)}}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="ls">
  <div class="lbox">
    <div class="llogo">Nexus<span>.</span></div>
    <p class="lsub">Откройте два окна браузера и войдите под разными именами — переписка и реальные звонки работают между вкладками.</p>
    <label class="llbl">Быстрый выбор</label>
    <div class="chips">
      <div class="chip" onclick="pickUser('Alex')">Alex</div>
      <div class="chip" onclick="pickUser('Mika')">Mika</div>
      <div class="chip" onclick="pickUser('Dan')">Dan</div>
    </div>
    <label class="llbl">Или введите имя</label>
    <input id="ui" class="linp" placeholder="Ваше имя..." maxlength="20"/>
    <button class="lbtn" onclick="login()">Войти →</button>
    <div class="lerr" id="le"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <!-- Sidebar -->
  <div class="sb">
    <div class="sbh">
      <div class="sblogo">Nexus<span>.</span></div>
      <div class="myp">
        <div class="avsm" id="myav"></div>
        <span class="myn" id="myn"></span>
      </div>
    </div>
    <div class="sbs"><input class="sinp" placeholder="🔍  Поиск..." id="srch" oninput="renderCL()"/></div>
    <div class="cttl">Контакты онлайн</div>
    <div class="cl" id="cl"></div>
  </div>

  <!-- Chat -->
  <div class="ca" id="ca">
    <div class="ec" id="ec">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <p>Выберите контакт для начала переписки</p>
    </div>

    <!-- Chat header -->
    <div class="chdr" id="chdr" style="display:none">
      <div class="av" id="hav"></div>
      <div class="chi">
        <div class="cpn" id="hname"></div>
        <div class="cps" id="hstat">● онлайн</div>
      </div>
      <div class="cact">
        <button class="ibtn" title="Аудиозвонок" onclick="startCall('audio')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <button class="ibtn" title="Видеозвонок" onclick="startCall('video')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M15 10l4.553-2.276A1 1 0 0121 8.723v6.554a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Messages -->
    <div class="mw" id="mw" style="display:none">
      <div class="ddiv"><span id="dlbl"></span></div>
    </div>

    <!-- Typing -->
    <div class="ti" id="ti">
      <div class="td"><span></span><span></span><span></span></div>
      <span class="tl" id="tl"></span>
    </div>

    <!-- Input -->
    <div class="ia" id="ia" style="display:none">
      <div class="iw"><textarea id="mi" rows="1" placeholder="Написать сообщение..." maxlength="2000"></textarea></div>
      <button class="sbtn" onclick="sendMsg()">
        <svg viewBox="0 0 24 24"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
      </button>
    </div>

    <!-- CALL OVERLAY -->
    <div id="co">
      <div class="vm">
        <video id="rv" autoplay playsinline></video>
        <div class="nvp" id="nvp">
          <div style="position:relative;display:flex;align-items:center;justify-content:center">
            <div class="ring" id="crng"></div>
            <div class="nva" id="cnva"></div>
          </div>
          <div class="nvn" id="cnvn"></div>
          <div class="nvs" id="cnvs">Соединение...</div>
        </div>
      </div>

      <!-- Self pip -->
      <div class="sp" id="spip">
        <video id="lv" autoplay muted playsinline></video>
        <div class="smo" id="smo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M5.586 5.586a2 2 0 000 2.828l10 10a2 2 0 002.828-2.828l-10-10a2 2 0 00-2.828 0zM9 9v3a3 3 0 004.5 2.598M15 12V9a3 3 0 00-6 0v.5"/>
          </svg>
        </div>
      </div>

      <!-- Info bar -->
      <div class="cib">
        <div class="cpav" id="ciav"></div>
        <div class="cpnm" id="cinm"></div>
        <div class="ctmr" id="ctmr">00:00</div>
        <div class="cstx" id="cstx">Вызов...</div>
      </div>

      <!-- Controls -->
      <div class="cc">
        <button class="cbtn" id="cmute" title="Микрофон" onclick="toggleMute()">
          <svg id="im1" viewBox="0 0 24 24"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3zM19 10v2a7 7 0 01-14 0v-2H3v2a9 9 0 008 8.94V23h2v-2.06A9 9 0 0021 12v-2h-2z"/></svg>
          <svg id="im2" viewBox="0 0 24 24" style="display:none"><path d="M19 11h-1.7c0 .74-.16 1.43-.43 2.05l1.23 1.23c.56-.98.9-2.09.9-3.28zm-4.02.17c0-.06.02-.11.02-.17V4c0-1.66-1.34-3-3-3S9 2.34 9 4v.18l5.98 5.98zM4.27 3L3 4.27l6.01 6.01V11c0 1.66 1.33 3 2.99 3 .22 0 .44-.03.65-.08l1.66 1.66c-.71.33-1.5.52-2.31.52-2.76 0-5.3-2.1-5.3-5.1H5c0 3.41 2.72 6.23 6 6.72V21h2v-2.28c.91-.13 1.77-.45 2.54-.9L19.73 21 21 19.73 4.27 3z"/></svg>
        </button>
        <button class="cbtn" id="ccam" title="Камера" onclick="toggleCam()">
          <svg id="ic1" viewBox="0 0 24 24"><path d="M17 10.5V7a1 1 0 00-1-1H4a1 1 0 00-1 1v10a1 1 0 001 1h12a1 1 0 001-1v-3.5l4 4v-11l-4 4z"/></svg>
          <svg id="ic2" viewBox="0 0 24 24" style="display:none"><path d="M21 6.5l-4 4V7a1 1 0 00-1-1H9.82L21 17.18V6.5zM3.27 2L2 3.27 4.73 6H4a1 1 0 00-1 1v10a1 1 0 001 1h12c.21 0 .39-.08.54-.18L19.73 21 21 19.73 3.27 2z"/></svg>
        </button>
        <button class="cbtn end" title="Завершить" onclick="endCall(true)">
          <svg viewBox="0 0 24 24"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1-9.4 0-17-7.6-17-17 0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/></svg>
        </button>
        <button class="cbtn" id="cspk" title="Динамик" onclick="toggleSpk()">
          <svg id="is1" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
          <svg id="is2" viewBox="0 0 24 24" style="display:none"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<!-- INCOMING CALL -->
<div id="im">
  <div class="ibox">
    <div class="iiav" id="iav"></div>
    <div class="iin" id="iin"></div>
    <div class="iit" id="iit">Входящий звонок</div>
    <div class="iia">
      <button class="cta dec" onclick="declineCall()" title="Отклонить">
        <svg viewBox="0 0 24 24"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1-9.4 0-17-7.6-17-17 0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/></svg>
      </button>
      <button class="cta acc" onclick="acceptCall()" title="Принять">
        <svg viewBox="0 0 24 24"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1-9.4 0-17-7.6-17-17 0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
// ════════ STATE ════════
let me=null, ch=null, curChat=null;
let contacts={}, msgs={};
let typTmr={}, myTypTmr=null;

// WebRTC
let pc=null, localStream=null, callPartner=null, callType='audio';
let callRole=null, callState=null;
let callStart=null, timerIv=null;
let isMuted=false, isCamOff=false, isSpkOff=false;
let pending=[];
let offerSdp=null;

const ICE=[{urls:'stun:stun.l.google.com:19302'},{urls:'stun:stun1.l.google.com:19302'}];
const COL={Alex:'#6c8aff',Mika:'#ff6c8a',Dan:'#4ade80'};

function clr(n){return COL[n]||'#'+((Math.abs([...n].reduce((a,c)=>a*31+c.charCodeAt(0),0)))%0xffffff).toString(16).padStart(6,'0')}
function ini(n){return n.slice(0,2).toUpperCase()}
function ts(d){return new Date(d).toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'})}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>')}
function fmt(s){return`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`}
function ar(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px'}

let toastT;
function toast(h,d=3500){
  document.querySelectorAll('.toast').forEach(t=>t.remove());
  const t=document.createElement('div');t.className='toast';t.innerHTML=h;
  document.body.appendChild(t);clearTimeout(toastT);toastT=setTimeout(()=>t.remove(),d);
}

// ════════ LOGIN ════════
function pickUser(n){
  document.getElementById('ui').value=n;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  event.target.classList.add('active');
}
document.getElementById('ui').addEventListener('keydown',e=>{if(e.key==='Enter')login()});
function login(){
  const n=document.getElementById('ui').value.trim();
  if(!n){document.getElementById('le').textContent='Введите имя';return}
  me={name:n,color:clr(n)};
  document.getElementById('ls').style.display='none';
  document.getElementById('app').classList.add('on');
  const av=document.getElementById('myav');
  av.textContent=ini(n);av.style.background=me.color+'33';av.style.color=me.color;
  document.getElementById('myn').textContent=n;
  ch=new BroadcastChannel('nexus_v3');
  ch.onmessage=onMsg;
  bcast({type:'join',from:n,color:me.color});
  bcast({type:'who',from:n});
  window.addEventListener('beforeunload',()=>{bcast({type:'leave',from:n});cleanup()});
}
function bcast(d){try{ch.postMessage(d)}catch(e){}}

// ════════ INCOMING BC ════════
function onMsg(e){
  const d=e.data;if(d.from===me.name)return;
  switch(d.type){
    case 'join': addC(d.from,d.color);bcast({type:'pres',from:me.name,color:me.color});toast(`<strong>${d.from}</strong> вошёл в сеть`);break;
    case 'pres': addC(d.from,d.color);break;
    case 'who':  bcast({type:'pres',from:me.name,color:me.color});break;
    case 'leave':
      if(contacts[d.from])contacts[d.from].online=false;
      renderCL();
      if(curChat===d.from){const h=document.getElementById('hstat');if(h)h.textContent='○ не в сети'}
      toast(`<strong>${d.from}</strong> вышел из сети`);
      if(callPartner===d.from)endCall(false);
      break;
    case 'msg': recvMsg(d);break;
    case 'typ': if(d.to===me.name)showTyp(d.from);break;
    case 'styp': hideTyp(d.from);break;
    case 'read': markRead(d.mid);break;
    case 'offer':  if(d.to===me.name)onOffer(d);break;
    case 'answer': if(d.to===me.name)onAnswer(d);break;
    case 'ice':    if(d.to===me.name)onIce(d);break;
    case 'decline':if(d.to===me.name)onDeclined();break;
    case 'end':    if(d.to===me.name)endCall(false);break;
  }
}

// ════════ CONTACTS ════════
function addC(name,color){
  if(!contacts[name])contacts[name]={color,online:true,lastMsg:'',lastTime:null,unread:0};
  else contacts[name].online=true;
  if(!msgs[name])msgs[name]=[];
  renderCL();
}
function renderCL(){
  const q=(document.getElementById('srch')?.value||'').toLowerCase();
  const list=document.getElementById('cl');list.innerHTML='';
  const names=Object.keys(contacts).filter(n=>n.toLowerCase().includes(q));
  if(!names.length){list.innerHTML=`<div style="padding:24px 16px;text-align:center;color:var(--muted);font-size:13px">Откройте второй браузер<br>и войдите под другим именем</div>`;return}
  names.sort((a,b)=>(contacts[b].lastTime||0)-(contacts[a].lastTime||0));
  names.forEach(name=>{
    const c=contacts[name];
    const el=document.createElement('div');
    el.className='ci'+(curChat===name?' active':'');
    el.onclick=()=>openChat(name);
    el.innerHTML=`
      <div class="av" style="background:${c.color}22;color:${c.color}">${ini(name)}${c.online?'<div class="dot"></div>':''}</div>
      <div class="cin"><div class="cn">${name}</div><div class="cp">${c.lastMsg||'Нет сообщений'}</div></div>
      <div class="cm"><div class="ct">${c.lastTime?ts(c.lastTime):''}</div>${c.unread?`<div class="badge">${c.unread}</div>`:''}</div>`;
    list.appendChild(el);
  });
}

// ════════ OPEN CHAT ════════
function openChat(partner){
  curChat=partner;
  if(contacts[partner])contacts[partner].unread=0;
  renderCL();
  document.getElementById('ec').style.display='none';
  const c=contacts[partner];
  // header
  const hdr=document.getElementById('chdr');hdr.style.display='flex';
  const av=document.getElementById('hav');av.textContent=ini(partner);av.style.background=c.color+'22';av.style.color=c.color;
  document.getElementById('hname').textContent=partner;
  document.getElementById('hstat').textContent=c.online?'● онлайн':'○ не в сети';
  // messages
  const mw=document.getElementById('mw');mw.style.display='flex';
  document.getElementById('dlbl').textContent=new Date().toLocaleDateString('ru',{day:'numeric',month:'long'});
  mw.querySelectorAll('.mg,.cepill').forEach(el=>el.remove());
  msgs[partner].forEach(m=>renderBub(m,mw,false));
  mw.scrollTop=mw.scrollHeight;
  // input
  const ia=document.getElementById('ia');ia.style.display='flex';
  const inp=document.getElementById('mi');inp.value='';ar(inp);
  inp.oninput=onTyping;
  inp.onkeydown=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg()}};
  inp.focus();
  document.getElementById('tl').textContent=`${partner} печатает...`;
  document.getElementById('ti').classList.remove('show');
}

// ════════ MESSAGES ════════
function sendMsg(){
  const inp=document.getElementById('mi');if(!inp)return;
  const text=inp.value.trim();if(!text||!curChat)return;
  const m={id:Date.now()+'_'+Math.random().toString(36).slice(2),from:me.name,to:curChat,text,ts:Date.now()};
  msgs[curChat].push(m);
  const mw=document.getElementById('mw');renderBub(m,mw,true);mw.scrollTop=mw.scrollHeight;
  bcast({type:'msg',...m});
  clearTimeout(myTypTmr);bcast({type:'styp',from:me.name,to:curChat});
  inp.value='';ar(inp);inp.focus();
}
function recvMsg(d){
  if(!msgs[d.from])msgs[d.from]=[];msgs[d.from].push(d);
  if(contacts[d.from]){
    contacts[d.from].lastMsg=d.text.length>30?d.text.slice(0,30)+'…':d.text;
    contacts[d.from].lastTime=d.ts;
    if(curChat!==d.from)contacts[d.from].unread=(contacts[d.from].unread||0)+1;
  }
  hideTyp(d.from);renderCL();
  if(curChat===d.from){
    const mw=document.getElementById('mw');renderBub(d,mw,true);mw.scrollTop=mw.scrollHeight;
    bcast({type:'read',from:me.name,to:d.from,mid:d.id});
  } else toast(`<strong>${d.from}</strong>: ${d.text.slice(0,60)}`);
}
function renderBub(m,wrap,anim){
  const isMe=m.from===me.name,cls=isMe?'me':'them';
  let g=wrap.querySelector(`.mg.${cls}:last-child`);
  const ok=g&&(Date.now()-(parseInt(g.dataset.t)||0)<60000);
  if(!ok){g=document.createElement('div');g.className=`mg ${cls}`;wrap.appendChild(g)}
  g.dataset.t=m.ts;
  const b=document.createElement('div');b.className='bub';
  if(!anim)b.style.animation='none';
  b.dataset.id=m.id;b.innerHTML=`${esc(m.text)}<span class="bt">${ts(m.ts)}</span>`;
  g.appendChild(b);
  if(isMe){const r=document.createElement('div');r.className='rr';r.dataset.mid=m.id;r.textContent='✓ доставлено';g.appendChild(r)}
}
function markRead(mid){
  const r=document.querySelector(`.rr[data-mid="${mid}"]`);
  if(r){r.textContent='✓✓ прочитано';r.classList.add('read')}
}
function callPill(partner,txt,cls){
  if(curChat!==partner)return;
  const mw=document.getElementById('mw');if(!mw)return;
  const d=document.createElement('div');d.className='cepill';
  const icon=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  d.innerHTML=`<div class="cepill-inner ${cls}">${icon}${txt}</div>`;
  mw.appendChild(d);mw.scrollTop=mw.scrollHeight;
}

// ════════ TYPING ════════
function onTyping(){
  ar(document.getElementById('mi'));
  bcast({type:'typ',from:me.name,to:curChat});
  clearTimeout(myTypTmr);myTypTmr=setTimeout(()=>bcast({type:'styp',from:me.name,to:curChat}),2000);
}
function showTyp(from){
  if(from!==curChat)return;
  const ti=document.getElementById('ti');if(ti)ti.classList.add('show');
  clearTimeout(typTmr[from]);typTmr[from]=setTimeout(()=>hideTyp(from),3000);
}
function hideTyp(from){
  if(from!==curChat)return;
  const ti=document.getElementById('ti');if(ti)ti.classList.remove('show');
}

// ════════ WEBRTC CALLS ════════
async function startCall(type){
  if(!curChat){return}
  if(callState){toast('Уже идёт звонок');return}
  if(!contacts[curChat]?.online){toast('Пользователь не в сети');return}
  callType=type;callPartner=curChat;callRole='caller';callState='ringing';
  try{
    localStream=await navigator.mediaDevices.getUserMedia(type==='video'?{audio:true,video:true}:{audio:true,video:false});
  }catch(err){toast('❌ Нет доступа к микрофону/камере');callState=null;callPartner=null;return}
  showOverlay('caller');
  pc=mkPC();
  localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));
  const offer=await pc.createOffer();
  await pc.setLocalDescription(offer);
  bcast({type:'offer',from:me.name,to:callPartner,ct:type,sdp:offer.sdp});
}

async function onOffer(d){
  if(callState){bcast({type:'decline',from:me.name,to:d.from,reason:'busy'});return}
  callPartner=d.from;callType=d.ct;callRole='callee';callState='ringing';
  offerSdp=d.sdp;
  const c=contacts[d.from]||{color:'#6c8aff'};
  const av=document.getElementById('iav');
  av.textContent=ini(d.from);av.style.background=c.color+'33';av.style.color=c.color;
  document.getElementById('iin').textContent=d.from;
  document.getElementById('iit').textContent=d.ct==='video'?'📹 Видеозвонок':'📞 Аудиозвонок';
  document.getElementById('im').classList.add('show');
  startRing();
}

async function acceptCall(){
  stopRing();
  document.getElementById('im').classList.remove('show');
  callState='connecting';
  try{
    localStream=await navigator.mediaDevices.getUserMedia(callType==='video'?{audio:true,video:true}:{audio:true,video:false});
  }catch(err){
    toast('❌ Нет доступа к микрофону/камере');
    bcast({type:'decline',from:me.name,to:callPartner});
    callState=null;callPartner=null;return;
  }
  showOverlay('callee');
  pc=mkPC();
  localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));
  await pc.setRemoteDescription({type:'offer',sdp:offerSdp});
  for(const c of pending)await pc.addIceCandidate(c).catch(()=>{});
  pending=[];
  const ans=await pc.createAnswer();
  await pc.setLocalDescription(ans);
  bcast({type:'answer',from:me.name,to:callPartner,sdp:ans.sdp});
}

async function onAnswer(d){
  if(!pc)return;
  await pc.setRemoteDescription({type:'answer',sdp:d.sdp});
  callState='connecting';
}

async function onIce(d){
  if(!pc)return;
  const c=new RTCIceCandidate(d.candidate);
  if(pc.remoteDescription)await pc.addIceCandidate(c).catch(()=>{});
  else pending.push(c);
}

function declineCall(){
  stopRing();
  document.getElementById('im').classList.remove('show');
  bcast({type:'decline',from:me.name,to:callPartner});
  callPill(callPartner,'Входящий звонок — отклонён','missed');
  callState=null;callPartner=null;
}
function onDeclined(){
  toast(`<strong>${callPartner}</strong> отклонил звонок`);
  callPill(callPartner,'Исходящий звонок — отклонён','missed');
  cleanup();
}

function endCall(notify=true){
  if(notify&&callPartner)bcast({type:'end',from:me.name,to:callPartner});
  const dur=callStart?Math.floor((Date.now()-callStart)/1000):0;
  if(callPartner)callPill(callPartner,dur>0?`Звонок · ${fmt(dur)}`:'Звонок завершён','ok');
  cleanup();
}

function cleanup(){
  stopRing();
  clearInterval(timerIv);timerIv=null;callStart=null;
  if(localStream){localStream.getTracks().forEach(t=>t.stop());localStream=null}
  if(pc){pc.close();pc=null}
  document.getElementById('co').classList.remove('show');
  document.getElementById('im').classList.remove('show');
  const rv=document.getElementById('rv');rv.srcObject=null;rv.style.display='none';
  document.getElementById('lv').srcObject=null;
  document.getElementById('spip').style.display='none';
  document.getElementById('crng').style.display='block';
  document.getElementById('nvp').style.display='flex';
  document.getElementById('ctmr').style.display='none';
  document.getElementById('cstx').style.display='block';
  callPartner=null;callRole=null;callState=null;callType='audio';
  isMuted=false;isCamOff=false;isSpkOff=false;pending=[];offerSdp=null;
  syncUI();
}

function mkPC(){
  const p=new RTCPeerConnection({iceServers:ICE});
  p.onicecandidate=e=>{if(e.candidate)bcast({type:'ice',from:me.name,to:callPartner,candidate:e.candidate})};
  p.onconnectionstatechange=()=>{
    if(!p)return;
    if(p.connectionState==='connected')onConnected();
    if(['failed','disconnected','closed'].includes(p.connectionState))endCall(false);
  };
  p.ontrack=e=>{
    const rv=document.getElementById('rv');
    rv.srcObject=e.streams[0];
    if(callType==='video'){rv.style.display='block';document.getElementById('nvp').style.display='none'}
  };
  return p;
}

function onConnected(){
  callState='active';callStart=Date.now();
  document.getElementById('crng').style.display='none';
  document.getElementById('cstx').style.display='none';
  document.getElementById('ctmr').style.display='block';
  clearInterval(timerIv);
  timerIv=setInterval(()=>{
    if(!callStart)return;
    document.getElementById('ctmr').textContent=fmt(Math.floor((Date.now()-callStart)/1000));
  },1000);
  if(callType==='video'){
    document.getElementById('lv').srcObject=localStream;
    document.getElementById('spip').style.display='block';
  }
}

function showOverlay(role){
  const c=contacts[callPartner]||{color:'#6c8aff'};
  document.getElementById('co').classList.add('show');
  const ra=document.getElementById('cnva');ra.textContent=ini(callPartner);ra.style.background=c.color+'33';ra.style.color=c.color;
  document.getElementById('cnvn').textContent=callPartner;
  document.getElementById('cnvs').textContent=role==='caller'?'Вызов...':'Подключение...';
  const ia=document.getElementById('ciav');ia.textContent=ini(callPartner);ia.style.background=c.color+'33';ia.style.color=c.color;
  document.getElementById('cinm').textContent=callPartner;
  document.getElementById('ctmr').style.display='none';
  document.getElementById('cstx').style.display='block';
  document.getElementById('cstx').textContent=role==='caller'?'Вызов...':'Подключение...';
  if(localStream&&callType==='video'){document.getElementById('lv').srcObject=localStream;document.getElementById('spip').style.display='block'}
  syncUI();
}

// Controls
function toggleMute(){
  isMuted=!isMuted;
  if(localStream)localStream.getAudioTracks().forEach(t=>t.enabled=!isMuted);
  document.getElementById('cmute').classList.toggle('muted',isMuted);
  document.getElementById('im1').style.display=isMuted?'none':'block';
  document.getElementById('im2').style.display=isMuted?'block':'none';
  document.getElementById('smo').classList.toggle('show',isMuted);
}
function toggleCam(){
  if(callType!=='video'){toast('Видео недоступно в аудиозвонке');return}
  isCamOff=!isCamOff;
  if(localStream)localStream.getVideoTracks().forEach(t=>t.enabled=!isCamOff);
  document.getElementById('ccam').classList.toggle('camoff',isCamOff);
  document.getElementById('ic1').style.display=isCamOff?'none':'block';
  document.getElementById('ic2').style.display=isCamOff?'block':'none';
}
function toggleSpk(){
  isSpkOff=!isSpkOff;
  document.getElementById('rv').muted=isSpkOff;
  document.getElementById('cspk').classList.toggle('muted',isSpkOff);
  document.getElementById('is1').style.display=isSpkOff?'none':'block';
  document.getElementById('is2').style.display=isSpkOff?'block':'none';
}
function syncUI(){
  document.getElementById('cmute').classList.toggle('muted',isMuted);
  document.getElementById('im1').style.display=isMuted?'none':'block';
  document.getElementById('im2').style.display=isMuted?'block':'none';
  document.getElementById('ccam').classList.toggle('camoff',isCamOff);
  document.getElementById('ic1').style.display=isCamOff?'none':'block';
  document.getElementById('ic2').style.display=isCamOff?'block':'none';
  document.getElementById('is1').style.display=isSpkOff?'none':'block';
  document.getElementById('is2').style.display=isSpkOff?'block':'none';
}

// Ringtone
let rCtx=null,rIv=null;
function startRing(){
  try{
    rCtx=new AudioContext();
    function beep(){
      const o=rCtx.createOscillator(),g=rCtx.createGain();
      o.connect(g);g.connect(rCtx.destination);
      o.frequency.value=520;g.gain.value=0.12;
      o.start();o.stop(rCtx.currentTime+0.35);
    }
    beep();rIv=setInterval(beep,1000);
  }catch(e){}
}
